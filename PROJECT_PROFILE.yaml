project:
  repo: rasokiwayami/freelance-os
  type: portfolio_product_candidate
  domain: freelance_operations
  orchestrator: project_orchestrator
  primary_goal: Local-first freelance business management app with Supabase-backed workflows
  default_branch: master
  visibility: private_or_public_per_current_remote

runtime:
  local_only: true
  deployment: vercel_configured_but_not_default_action
  languages:
    - javascript
  package_managers:
    - npm
  operating_environment:
    - Mac local operation under /Users/sora/dev/freelance-os
    - Legacy Windows/WSL operation remains a normal Node/Vite context

authority:
  global_default_band: A2
  canonical_authority_registry: shieikan/jinsei/registries/AUTHORITY_MATRIX.md
  forbidden:
    - credential or token exposure
    - Supabase production data mutation without explicit approval
    - external deployment without explicit approval
    - raw user/customer/business data in tracked files
    - push without required Review Controller approval

autonomy:
  default_level: L5_for_development
  policy_registry: shieikan/jinsei/registries/AUTONOMY_POLICY_MATRIX.md
  enabled:
    - dev.local_edit
    - dev.local_test
    - dev.local_commit
    - dev.github_push
    - dev.github_pr_create
    - dev.github_issue_comment
    - dev.github_issue_label
    - dev.github_issue_close
  gated:
    - dev.deploy_public
    - dev.repo_visibility_change
    - dev.secret_mutation
    - dev.production_data_mutation
    - dev.billing_or_paid_service_change
    - publication.public_claim

global_coding_department:
  default_route:
    - Executive Orchestrator
    - FreelanceOS Project Orchestrator
    - Implementation Planning Worker
    - Implementation Worker
    - Implementation Review Controller
  queue_request_command: cd /Users/sora/dev/jinsei && python3 scripts/dispatch_codex_session.py --queue-request --project "FreelanceOS" --repo /Users/sora/dev/freelance-os
  run_queue_command: cd /Users/sora/dev/jinsei && python3 scripts/dispatch_codex_session.py --from-queue --limit 3
  push_review_check_command: cd /Users/sora/dev/jinsei && python3 scripts/dispatch_codex_session.py --check-push-review --project "FreelanceOS"
  required_for:
    - non_trivial_implementation
    - multi_file_changes
    - auth_or_safety_work
    - supabase_or_ai_api_changes
    - gui_or_design_work
    - deploy_or_push_readiness

verification:
  default:
    - npm run lint
    - npm run test
    - npm run build
  formatting:
    - git diff --check

state:
  ignored_runtime_dirs:
    - node_modules/
    - dist/
    - coverage/
    - playwright-report/
    - test-results/
  canonical_progress:
    - AGENTS.md
    - PROJECT_PROFILE.yaml
    - CLAUDE.md
    - package.json
    - src/
